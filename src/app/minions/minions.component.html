<div class="card" *ngFor="let minion of minions">
    <img class="card-img-top" style="width: 18rem;" src="{{minion.img}}" alt="Card image cap">
    <div class="card-body">
      <h5 class="card-title">{{minion.name}}</h5>
      <p class="card-text">{{minion.bio}}</p>
      <p class="card-text">Birth: {{minion.birth}} | Side: {{minion.side}}</p>
    </div>
</div>
